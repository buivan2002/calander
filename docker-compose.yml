# calander/docker-compose.yml

services:
  frontend:
    image: ${DOCKER_REGISTRY}/calendar-api-frontend:${FRONTEND_IMAGE_TAG:-latest}
    # ✅ FIX #1: container_name PHẢI khớp với DNS mà Nginx đang dùng
    container_name: frontend-calendar

    restart: unless-stopped

    # ✅ FIX #2: XÓA TOÀN BỘ block 'ports' — Zero Trust, không map gì ra host
    # ports:   <-- ĐÃ XÓA

    env_file:
      - .env

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # ✅ FIX #3: Dùng 127.0.0.1 thay vì localhost để tránh bẫy IPv6 trên Alpine
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      # ✅ FIX #4: Kết nối vào đúng proxy-network để Nginx nhìn thấy
      - proxy-network

networks:
  # ✅ FIX #5: Khai báo external — mạng này do Nginx tạo, KHÔNG để Compose tạo lại
  proxy-network:
    external: true

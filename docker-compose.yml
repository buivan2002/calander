
services:
  frontend:
    # 1. THAY THẾ BUILD BẰNG IMAGE PULL TỪ REGISTRY
    # Dùng biến môi trường để CI/CD có thể truyền tag động (ví dụ: commit SHA) vào.
    # Nếu không truyền, mặc định sẽ lấy tag 'latest'
    image: ${DOCKER_REGISTRY}/calendar-api-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: frontend-calendar_prod
    
    # 2. KHÔNG BAO GIỜ TIN TƯỞNG TIẾN TRÌNH TRONG CONTAINER
    restart: always # hoặc unless-stopped, nhưng phải đi kèm Healthcheck
    
    ports:
      - "4000:4000"
    
    env_file:
      - .env

    # 3. CHỐNG TRÀN Ổ CỨNG (LOG ROTATION)
    # Không có cái này, vài tháng sau log phình ra vài chục GB sập server ráng chịu.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 4. HEALTHCHECK - CHỐNG "TREO CỔ" BỀ MẶT
    # Container 'Up' không có nghĩa là App bên trong 'Sống'.
    # Phải bắt Docker ping thẳng vào endpoint của app để kiểm tra.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"] # Nhớ tạo route /api/health trong code
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s # Cho Next/Node thời gian khởi động

    # 5. ISOLATE NETWORK (Bảo mật cơ bản)
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
name: Deploy - Frontend (Next.js)

on:
  push:
    branches:
      - main
      - develop
  
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: deploy-fe-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DOCKER_ORG: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: calendar-api-frontend

jobs:
  # ========================================
  # Build & Push Frontend Docker Image
  # ========================================
  build-and-push:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    environment: stagging
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}},enabled=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
          # Build arguments - Next.js environment variables (baked into build)
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_ENVIRONMENT=production
          
          # Docker layer caching
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: 'echo "Image digest: ${{ steps.build.outputs.digest }}"'

      - name: Create directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: mkdir -p /root/Fe-calander

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.yml"
          target: "/root/Fe-calander"
  # ========================================
  # Deploy to Production VPS
  # ========================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: stagging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          
          script: |
            set -e
            
            echo "================================"
            echo "🚀 Deploying Frontend (Next.js)"
            echo "================================"
            RAW_BRANCH="${{ github.ref_name }}"
            SAFE_TAG="${RAW_BRANCH//\//-}"
            export FRONTEND_IMAGE_TAG="$SAFE_TAG"
            export DOCKER_REGISTRY="${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}"
            # Navigate to deployment directory
            cd /root/Fe-calander
            cat > .env << 'EOFENV'
            # .env - Generated by CI/CD
            PORT=${{ secrets.BACKEND_PORT || '4000' }}
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            EOFENV
            echo "✅ .env created"
            # Pull latest image
            echo "📥 Pulling latest frontend image..."
            docker pull ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:$SAFE_TAG
            
            # Update docker-compose
            echo "🔄 Updating frontend service..."
            docker-compose -f docker-compose.yml pull
            docker-compose -f docker-compose.yml down --remove-orphans
            docker-compose -f docker-compose.yml up -d
            
            # Verify service is running
            echo "✅ Verifying frontend service..."
            sleep 5
            docker-compose -f docker-compose.yml ps
            
            # Check health
            HEALTH_CHECK=$(docker-compose -f docker-compose.yml exec -T frontend curl -f http://localhost:4000 2>/dev/null || echo "failed")
            if [ "$HEALTH_CHECK" != "failed" ]; then
              echo "✨ Frontend is healthy!"
            else
              echo "⚠️  Frontend health check pending..."
            fi
            
            # Show logs
            echo "📋 Recent logs:"
            docker-compose -f docker-compose.yml logs --tail=20 frontend

      - name: Slack Notification - Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ Frontend deployment successful'
          fields: ref,commit,author,took
        continue-on-error: true

      - name: Slack Notification - Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '❌ Frontend deployment failed'
          fields: ref,commit,author,took
        continue-on-error: true
